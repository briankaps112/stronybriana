<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Malowanki dla dzieci</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; font-family: Arial, sans-serif; }

  #strona {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  #naglowek {
    background: #cc0000;
    color: white;
    text-align: center;
    font-size: 2rem;
    font-weight: bold;
    padding: 18px 0;
    letter-spacing: 6px;
  }

  #srodek {
    display: flex;
    flex: 1;
    background: #f0dfa0;
  }

  #menu {
    background: #e07c10;
    width: 155px;
    min-width: 155px;
    padding: 30px 10px 30px 18px;
  }

  #menu ul {
    list-style: disc;
    padding-left: 18px;
  }

  #menu ul li {
    margin: 12px 0;
    font-size: 1.15rem;
    font-weight: bold;
  }

  #menu ul li a {
    color: #ffff00;
    text-decoration: none;
  }

  #menu ul li a:hover {
    text-decoration: underline;
  }

  #obrazki {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 20px;
    gap: 20px;
  }

  .miejsce-na-obrazek {
    width: 200px;
    height: 200px;
  }

  .miejsce-na-obrazek img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  #stopka {
    background: #c0bce0;
    text-align: right;
    padding: 10px 16px;
    font-size: 0.85rem;
    color: #333;
    font-style: italic;
  }
</style>
</head>
<body>

<div id="strona">

  <div id="naglowek">Malowanki &nbsp; dla &nbsp; dzieci</div>

  <div id="srodek">

    <div id="menu">
      <ul>
        <li><a href="https://pl.wikipedia.org/wiki/Ryby">Rybki</a></li>
        <li><a href="https://pl.wikipedia.org/wiki/Koty">Koty</a></li>
        <li><a href="https://pl.wikipedia.org/wiki/Owca_domowa">Owieczki</a></li>
        <li><a href="https://pl.wikipedia.org/wiki/Fokowate">Foki</a></li>
        <li><a href="https://pl.wikipedia.org/wiki/Motyle">Motyle</a></li>
      </ul>
    </div>

    <div id="obrazki">

      <div class="miejsce-na-obrazek">
        <img src="ryba.png" alt="Ryba">
      </div>

      <div class="miejsce-na-obrazek">
        <img src="motyl.png" alt="Motyl">
      </div>

    </div>
  </div>

  <div id="stopka">Adres e-mail:maluj@interia.pl</div>

</div>

</body>
</html>
